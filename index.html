<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>MULTIVARKA</title>
    <meta name="description" content="multivarka socials">
    <meta name="keywords" content="MULTIVARKA, мультиварка, themultivarka, multivarka">
    <meta name="author" content="Multivarka">

    <meta property="og:title" content="MULTIVARKA">
    <meta property="og:description" content="multivarka socials">
    <meta property="og:image" content="/banner.webp">
    <meta property="og:url" content="https://multivarka.com">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="/banner.webp">

    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
        :root{--bg:#000;--text:#fff;--steam:#66c0f4;--tg:#2ca5e0;--twitch:#9146ff;--yt:#f00}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .wrapper{display:flex;gap:60px;align-items:center}
        .container{text-align:center}
        h1{font-size:4rem;margin-bottom:0.5rem;letter-spacing:2px}
        p{font-size:1rem;color:#888;margin-bottom:2rem;text-transform:uppercase;letter-spacing:1px}
        .social{display:flex;gap:2rem;justify-content:center;margin-bottom:3rem}
        .social a{font-size:2.5rem;color:var(--text);transition:.1s}
        .social a:hover{transform:scale(1.15)}
        .social a[title=Telegram]:hover{color:var(--tg)}
        .social a[title=YouTube]:hover{color:var(--yt)}
        .social a[title=Twitch]:hover{color:var(--twitch)}
        .social a[title=Steam]:hover{color:var(--steam)}
        
        .projects-title{font-size:0.8rem;color:#444;text-transform:uppercase;letter-spacing:3px;margin-bottom:1.5rem}
        .projects{display:flex;gap:1.5rem;justify-content:center;align-items:center}
        .projects a img{width:99px;height:99px;opacity:0.6;transition:.2s;filter:grayscale(1) invert(1)}
        .projects a[title="Kapitanych"] img,
        .projects a[title="Bezdarnost"] img {
            width:70px;
            height:70px;
            border-radius:50%;
            filter:none;
        }
        .projects a:hover img{opacity:1;transform:translateY(-3px);filter:none}

        @media(max-width:900px){.wrapper{flex-direction:column;padding:20px}}
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <h1>MULTIVARKA</h1>
            <div class="social">
                <a href="https://www.twitch.tv/themultivarka" target="_blank" title="Twitch"><i class="fab fa-twitch"></i></a>
                <a href="https://t.me/multicooker01" target="_blank" title="Telegram"><i class="fab fa-telegram"></i></a>
                <a href="https://www.youtube.com/@themultivarka" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
                <a href="https://steamcommunity.com/profiles/76561199707898172/" target="_blank" title="Steam"><i class="fab fa-steam"></i></a>
            </div>

            <div class="projects-title">My Projects</div>
            <div class="projects">
                <a href="https://twir.app/s/kapitanych" target="_blank" title="Kapitanych"><img src="https://raw.githubusercontent.com/multivarka01/multivarka/main/kapianych.png" alt="Kapitanych"></a>
                <a href="https://bezdarno.st" target="_blank" title="Bezdarnost"><img src="https://raw.githubusercontent.com/multivarka01/multivarka/main/andryha.png" alt="Bezdarnost"></a>
            </div>
        </div>
        <div style="width:360px;max-width:100%">
            <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-post="multicooker01/993" data-width="100%" data-dark="1" data-color="F646A4"></script>
        </div>
    </div>
</body>
</html>
